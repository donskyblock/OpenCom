x-backend-service: &backend-service
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: opencom-backend-local:latest
  env_file:
    - ./backend/.env
    - ./backend/.env.docker
  restart: unless-stopped
  working_dir: /app/backend
  init: true

services:
  mariadb-core:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ods_core
      MARIADB_USER: ods
      MARIADB_PASSWORD: ods
    ports:
      - "${CORE_DB_PORT:-3307}:3306"
    volumes:
      - mariadb_core:/var/lib/mysql
  mariadb-node:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ods_node
      MARIADB_USER: ods
      MARIADB_PASSWORD: ods
    ports:
      - "${NODE_DB_PORT:-3308}:3306"
    volumes:
      - mariadb_node:/var/lib/mysql

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  core:
    <<: *backend-service
    depends_on:
      mariadb-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /bin/sh -lc "npm run migrate:core && npm run start:core"
    ports:
      - "${CORE_HTTP_PORT:-3001}:3001"
      - "${CORE_GATEWAY_PORT_PUBLIC:-9443}:9443"
    volumes:
      - core_logs:/app/backend/logs
      - core_profiles:/app/backend/storage/profiles
      - core_attachments:/app/backend/data/attachments
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  node:
    <<: *backend-service
    depends_on:
      mariadb-node:
        condition: service_healthy
      core:
        condition: service_healthy
    command: /bin/sh -lc "npm run migrate:node && npm run start:node"
    ports:
      - "${NODE_HTTP_PORT:-3002}:3002"
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/udp"
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/tcp"
    volumes:
      - node_logs:/app/backend/logs
      - node_attachments:/app/backend/data/attachments
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: opencom-frontend-local:latest
    env_file:
      - ./frontend/.env
      - ./frontend/.env.docker
    restart: unless-stopped
    init: true
    depends_on:
      core:
        condition: service_healthy
      node:
        condition: service_healthy
    environment:
      FRONTEND_INTERNAL_PORT: "5173"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mariadb_core:
  mariadb_node:
  minio_data:
  core_logs:
  core_profiles:
  core_attachments:
  node_logs:
  node_attachments:
